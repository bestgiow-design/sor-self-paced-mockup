<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小達人 App · 金幣／遊戲原型（手機）</title>
<style>
:root{--coral:#EF9F72;--coral2:#EE9266;--coralbtn:#EF8B7A;--green:#74C39A;--gold:#E8A93C;--blue:#7FB3E6;--ink:#3a3a3a;--grey:#9aa0a6;--lgrey:#f1f2f4;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",sans-serif;}
body{margin:0;background:#c9d0d8;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:22px 10px;color:var(--ink);}
.cap{font-size:12px;color:#5a6b7d;margin-bottom:10px;text-align:center;}
.phone{width:390px;max-width:96vw;height:820px;background:#fff;border-radius:42px;border:10px solid #11151b;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.sb{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:14px;font-weight:700;flex:none;position:absolute;top:0;left:0;right:0;z-index:20;color:#fff;}
.sb.dark{color:#222;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;background:#fff;position:relative;}
.scroll::-webkit-scrollbar{width:0;}
.screen{display:none;}.screen.on{display:block;min-height:100%;}
/* coral top */
.ctop{background:var(--coral);padding:52px 18px 20px;border-radius:0 0 26px 26px;color:#fff;text-align:center;}
.ctop .streak{font-size:24px;font-weight:800;margin-bottom:4px;}
.ctop .sub{font-size:14px;opacity:.95;}
.coinbtn{display:inline-flex;align-items:center;gap:4px;cursor:pointer;}
.chip-course{display:inline-block;background:#8ec5ee;color:#fff;font-size:12.5px;font-weight:700;border-radius:16px;padding:6px 14px;margin:12px 8px 0;}
.pill{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--coral2);font-weight:800;font-size:15px;border-radius:22px;padding:9px 20px;margin-top:12px;box-shadow:0 2px 6px rgba(0,0,0,.12);cursor:pointer;}
.wtabs{display:flex;justify-content:center;gap:22px;margin-top:16px;font-size:14px;}
.wtabs b{font-weight:800;}.wtabs span{opacity:.6;}
.week{display:flex;justify-content:space-between;margin-top:12px;padding:0 2px;}
.day{display:flex;flex-direction:column;align-items:center;gap:4px;width:13%;}
.day .lbl{font-size:12px;opacity:.9;}
.day .ring{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;position:relative;}
.day .ring.b{border-color:#4a90e2;}
.day .chk{position:absolute;bottom:-4px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--green);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;border:2px solid var(--coral);}
.body{padding:14px 16px 20px;}
.card{background:#fff;border-radius:20px;box-shadow:0 3px 12px rgba(0,0,0,.07);padding:18px;margin-bottom:14px;}
.hwcard{text-align:center;position:relative;}
.illus{height:150px;border-radius:14px;background:#faf6f2;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:6px;}
.prog{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 16px;}
.prog .ring2{width:64px;height:64px;border-radius:50%;border:6px solid #f6d5cb;color:var(--coralbtn);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;}
.bigbtn{display:block;width:100%;border:0;background:var(--coralbtn);color:#fff;font-size:17px;font-weight:800;border-radius:26px;padding:15px;cursor:pointer;}
.tools{position:absolute;right:-2px;top:70px;display:flex;flex-direction:column;gap:2px;}
.tool{width:44px;height:44px;border-radius:12px 0 0 12px;display:flex;align-items:center;justify-content:center;font-size:19px;background:#f3f4f6;color:#c9ccd1;}
.tool.on{background:var(--green);color:#fff;}
/* nav */
.nav{display:flex;background:#fff;border-top:1px solid #eee;flex:none;}
.nav button{flex:1;border:0;background:none;padding:8px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px;color:#7a7f85;cursor:pointer;position:relative;}
.nav .ic{width:30px;height:30px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nav button.on{color:var(--coral2);font-weight:800;}
.nav button.on .ic{background:var(--coral);color:#fff;}
.badge{position:absolute;top:4px;left:calc(50% + 6px);background:#e5484d;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;}
/* game hub */
.ghero{background:var(--coral);padding:52px 20px 22px;border-radius:0 0 26px 26px;color:#fff;}
.gbal{font-size:14px;opacity:.95;}
.gbal .n{font-size:30px;font-weight:800;}
.gwrap{margin-top:14px;}
.gwrap .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;opacity:.95;}
.gbar{height:10px;background:rgba(255,255,255,.3);border-radius:8px;overflow:hidden;}
.gfill{height:100%;background:#fff;border-radius:8px;}
.gcards{padding:16px;}
.gcard{display:flex;align-items:center;gap:16px;background:#fff;border-radius:20px;box-shadow:0 3px 12px rgba(0,0,0,.07);padding:18px;margin-bottom:14px;cursor:pointer;}
.gcard .gi{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;flex:none;}
.gcard h3{margin:0 0 3px;font-size:18px;}
.gcard p{margin:0;font-size:12.5px;color:var(--grey);}
.gcard .arw{margin-left:auto;color:#ccc;font-size:20px;}
/* overlay screens */
.ov{position:absolute;inset:0;background:#f6f7f8;z-index:30;display:none;flex-direction:column;}
.ov.on{display:flex;}
.ohead{background:var(--coral);color:#fff;padding:46px 16px 14px;display:flex;align-items:center;gap:10px;flex:none;}
.ohead .bk{font-size:22px;cursor:pointer;}
.ohead h2{margin:0;font-size:18px;}
.obody{flex:1;overflow-y:auto;padding:14px;}
.obody::-webkit-scrollbar{width:0;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.doll{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;}
.doll img{width:100%;height:118px;object-fit:contain;background:#f7f5f2;padding:6px;}
.doll .info{padding:8px 10px 11px;}
.doll .nm{font-size:14px;font-weight:800;}
.rb{display:inline-block;font-size:10px;color:#fff;border-radius:9px;padding:2px 9px;margin-top:4px;}
.r普通{background:var(--green);}.r稀有{background:var(--blue);}.r傳說{background:var(--gold);color:#6b4a00;}
.doll .pr{float:right;font-size:13px;font-weight:800;color:var(--coral2);margin-top:5px;}
.owned{font-size:10px;color:var(--green);font-weight:800;margin-top:4px;}
.led{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.led .dot{width:34px;height:34px;border-radius:50%;background:#faf1e6;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;}
.led .t{flex:1;}.led .t b{font-size:14px;}.led .t span{display:block;font-size:11px;color:var(--grey);}
.amt{font-weight:800;}.amt.p{color:var(--green);}.amt.n{color:#e07a5f;}
.dbig{width:100%;height:230px;object-fit:contain;border-radius:16px;background:#f7f5f2;padding:8px;}
.row{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid #eee;}
.stars i{display:inline-block;width:9px;height:9px;border-radius:50%;background:#dcdce0;margin-right:3px;}
.stars i.on{background:var(--gold);}
.maprow{display:flex;overflow-x:auto;gap:0;padding:24px 14px;align-items:center;}
.maprow::-webkit-scrollbar{height:0;}
.mn{flex:none;display:flex;flex-direction:column;align-items:center;width:40px;}
.mn .pt{width:15px;height:15px;border-radius:50%;background:#d4d8dd;border:2px solid #fff;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.mn.done .pt{background:var(--green);}
.mn .st{font-size:20px;cursor:pointer;}
.mn .num{font-size:9px;color:var(--grey);margin-top:4px;}
#mask{position:absolute;inset:0;background:rgba(20,20,25,.4);z-index:60;display:none;align-items:center;justify-content:center;}
#mask.on{display:flex;}
.dlg{background:#fff;border-radius:18px;width:80%;overflow:hidden;text-align:center;}
.dlg .c{padding:20px 18px 8px;}
.dlg h3{margin:0 0 6px;font-size:17px;}
.dlg p{margin:0;font-size:14px;color:#666;}
.dlg .btns{display:flex;border-top:1px solid #eee;margin-top:14px;}
.dlg .btns button{flex:1;border:0;background:none;padding:13px;font-size:16px;cursor:pointer;color:var(--blue);}
.dlg .btns button.pri{font-weight:800;border-left:1px solid #eee;}
.actbtn{display:block;width:100%;border:0;border-radius:26px;padding:14px;font-size:16px;font-weight:800;background:var(--coralbtn);color:#fff;cursor:pointer;}
.actbtn:disabled{background:#ccc;}
.toast{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(.9);background:rgba(20,20,25,.9);color:#fff;padding:16px 24px;border-radius:14px;z-index:70;text-align:center;opacity:0;pointer-events:none;transition:.25s;}
.toast.on{opacity:1;transform:translate(-50%,-50%) scale(1);}
.toast .big{font-size:28px;margin-bottom:4px;}
.ph{padding:60px 24px;text-align:center;color:var(--grey);}
.ph .e{font-size:54px;}
/* game map */
.screen[data-s=game]{position:absolute;inset:0;bottom:0;display:none;}
.screen[data-s=game].on{display:block;}
.gamewrap{position:absolute;inset:0;overflow:auto;background:linear-gradient(#c6d7dd 0%,#c6d7dd 22%,#aecab4 100%);}
.gamewrap::-webkit-scrollbar{width:0;height:0;}
.gamemap{position:relative;background-size:100% 100%;background-repeat:no-repeat;background-position:center;}
.piece{position:absolute;transform:translate(-50%,-62%);z-index:7;transition:left .8s cubic-bezier(.4,0,.3,1),top .8s ease;filter:drop-shadow(0 4px 4px rgba(0,0,0,.35));}
.piece img{width:54px;height:54px;border-radius:50%;border:3px solid #fff;object-fit:contain;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.piece .defpin{font-size:38px;}
.deco{position:absolute;pointer-events:none;filter:drop-shadow(0 3px 3px rgba(0,0,0,.12));}
.node{position:absolute;width:52px;height:52px;border-radius:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#3a6b2f;background:#e9f7dd;border:3px solid #fff;box-shadow:0 3px 6px rgba(0,0,0,.2);z-index:3;}
.node.done{background:#d7f0c2;}
.node.future{background:#dfe6d8;color:#9aa88f;}
.node.chest{background:none;border:0;box-shadow:none;color:#fff;font-size:34px;}
.node.chest .cnum{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:#fff;color:#b8860b;font-size:11px;border-radius:8px;padding:0 6px;font-weight:800;}
.pin{position:absolute;transform:translate(-50%,-100%);z-index:6;transition:top .9s cubic-bezier(.5,-0.2,.3,1.3),left .9s ease;filter:drop-shadow(0 4px 4px rgba(0,0,0,.3));}
.pin svg{display:block;}
.pin .halo{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:64px;height:26px;background:radial-gradient(rgba(255,255,255,.6),transparent 70%);border-radius:50%;}
.mapover{position:absolute;top:46px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:0 14px;z-index:12;pointer-events:none;}
.coinpill{background:rgba(0,0,0,.35);color:#fff;font-weight:800;border-radius:20px;padding:7px 14px;font-size:15px;backdrop-filter:blur(2px);}
.mapicons{display:flex;flex-direction:column;gap:10px;pointer-events:auto;}
.mapicons button{width:56px;height:56px;border:0;border-radius:18px;background:#fff;box-shadow:0 3px 8px rgba(0,0,0,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--coral2);cursor:pointer;gap:1px;}
.mapicons .mi{font-size:24px;}
.advbar{position:absolute;left:0;right:0;bottom:0;padding:12px 16px 14px;background:linear-gradient(transparent,rgba(0,0,0,.12));z-index:12;}
.advbtn{display:block;width:100%;border:0;border-radius:16px;padding:15px;font-size:16px;font-weight:800;color:#fff;background:#5cc04a;box-shadow:0 4px 0 #46a038;cursor:pointer;}
.advbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #46a038;}
.pop{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(.6);z-index:40;background:#fff;border-radius:20px;padding:22px 26px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.3s;}
.pop.on{opacity:1;transform:translate(-50%,-50%) scale(1);}
.pop .e{font-size:52px;}
.pop b{font-size:19px;display:block;margin-top:4px;}
.pop span{font-size:13px;color:#777;}
@keyframes sparkle{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1.6) rotate(60deg);opacity:0}}
.spark{position:absolute;z-index:20;font-size:22px;animation:sparkle .7s ease-out forwards;pointer-events:none;}
/* ===== 手機／平板 切換器 ===== */
.switch{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:14px;}
.switch .ttl{font-size:14px;color:#41525f;font-weight:700;}
.seg{display:inline-flex;background:#e6e9ee;border-radius:22px;padding:4px;gap:2px;}
.seg button{border:0;background:none;font-size:14px;font-weight:800;color:#7a828c;border-radius:18px;padding:7px 22px;cursor:pointer;transition:.15s;}
.seg button.on{background:var(--coral);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.15);}
/* ===== 平板模式 overrides ===== */
body.tab .phone{width:834px;height:1120px;border-radius:34px;border-width:12px;}
body.tab .ctop{padding-top:58px;}
body.tab .wtabs,body.tab .week{max-width:540px;margin-left:auto;margin-right:auto;}
body.tab .ctop .streak{font-size:28px;}
body.tab .body{max-width:660px;margin-left:auto;margin-right:auto;}
body.tab .illus{height:190px;font-size:74px;}
body.tab .grid{grid-template-columns:1fr 1fr 1fr;}
body.tab .doll img{height:150px;}
body.tab .obody{padding:20px 26px;}
body.tab .ohead{padding-left:26px;padding-right:26px;}
body.tab .led{max-width:660px;margin-left:auto;margin-right:auto;}
body.tab .nav .ic{width:34px;height:34px;font-size:22px;}
body.tab .tool{width:50px;height:50px;font-size:22px;}
body.tab .dlg{width:460px;}
body.tab .piece img{width:64px;height:64px;}
</style>
</head>
<body>
<div class="switch">
  <div class="ttl">小達人 App · 金幣／遊戲原型（建立在實機介面上）</div>
  <div class="seg"><button id="mPhone" class="on" onclick="setMode('phone')">手機</button><button id="mTab" onclick="setMode('tablet')">平板</button></div>
</div>
<div class="phone">
  <div class="sb" id="sb"><span>4:43</span><span>••• 4G 🔋</span></div>
  <div class="scroll" id="scroll">

    <!-- 學習 -->
    <div class="screen on" data-s="learn">
      <div class="ctop">
        <div class="streak">連續學習 1 天</div>
        <div class="sub">累積 105 天 · <span class="coinbtn" onclick="openOv('ledger')">🪙 <b id="balL">69,600</b></span></div>
        <div class="pill" onclick="toast('📅','課表','點課表可設定練習時段')">📅 課表</div>
        <div class="wtabs"><span>上週</span><b>本週</b><span>下週</span></div>
        <div class="week" id="week"></div>
      </div>
      <div style="padding:12px 16px 0;">
        <span class="chip-course">拼讀小達人-第一階-第4期-A190-楊宗翰</span>
      </div>
      <div class="body">
        <div class="card hwcard">
          <div class="tools">
            <div class="tool">🎬</div><div class="tool on">🎤</div><div class="tool">✏️</div><div class="tool">⬆️</div><div class="tool">🎥</div>
          </div>
          <div class="illus">🧑‍💻</div>
          <div class="prog"><span style="font-weight:800;">影片完成進度</span><div class="ring2">0%</div></div>
          <button class="bigbtn" onclick="toast('🎬','看的作業','共 1 項（示意）')">看的作業　共 1 項</button>
        </div>
      </div>
    </div>

    <!-- 訊息 -->
    <div class="screen" data-s="msg"><div class="ph"><div class="e">✉️</div><p>訊息（沿用實機，本原型未展開）</p></div></div>

    <!-- 遊戲：一進來就是地圖 -->
    <div class="screen" data-s="game">
      <div class="gamewrap" id="gamewrap">
        <div class="gamemap" id="gamemap"></div>
      </div>
      <div class="mapover">
        <div class="coinpill">🪙 <b id="balG">69,600</b></div>
        <div class="mapicons">
          <button onclick="openOv('shop')"><span class="mi">🧸</span>商店</button>
          <button onclick="openOv('collect')"><span class="mi">🏆</span>收藏</button>
        </div>
      </div>
      <div class="advbar"><button class="advbtn" id="advBtn" onclick="advance()">✅ 完成本週目標 · 前進一格</button></div>
    </div>

    <!-- 個人 -->
    <div class="screen" data-s="me"><div class="ph"><div class="e">👤</div><p>個人（沿用實機，本原型未展開）</p></div></div>

    <!-- 金幣明細 -->
    <div class="ov" data-o="ledger">
      <div class="ohead"><span class="bk" onclick="closeOv()">‹</span><h2>金幣明細</h2></div>
      <div class="obody"><div id="ledlist"></div></div>
    </div>
    <!-- 公仔商店 -->
    <div class="ov" data-o="shop">
      <div class="ohead"><span class="bk" onclick="closeOv()">‹</span><h2>公仔商店</h2></div>
      <div class="obody"><div class="grid" id="dollgrid"></div>
        <p style="font-size:11px;color:#999;text-align:center;margin-top:12px;">每隻限擁有一隻 · 升階不可跳級 · 兌換後不可退</p></div>
    </div>
    <!-- 公仔詳情 -->
    <div class="ov" data-o="detail">
      <div class="ohead"><span class="bk" onclick="openOv('shop')">‹</span><h2 id="dTitle">公仔</h2></div>
      <div class="obody">
        <img id="dImg" class="dbig" src="">
        <div style="margin:12px 0 4px;"><span id="dBadge" class="rb"></span></div>
        <div class="stars" id="dStars"></div>
        <div id="dOwned" style="font-size:13px;color:var(--green);font-weight:800;margin:8px 0;"></div>
        <div class="card" id="dCard" style="box-shadow:none;border:1px solid #eee;"></div>
      </div>
      <div style="padding:14px 16px;background:#fff;"><button class="actbtn" id="dAct" onclick="doAct()"></button></div>
    </div>
    <!-- 收藏 -->
    <div class="ov" data-o="collect">
      <div class="ohead"><span class="bk" onclick="closeOv()">‹</span><h2>我的收藏 <span id="colHead" style="font-size:13px;opacity:.85;"></span></h2></div>
      <div class="obody"><div class="grid" id="collectgrid"></div></div>
    </div>

  </div>
  <div class="nav" id="nav"></div>
  <div id="mask"><div class="dlg" id="dlg"></div></div>
  <div class="pop" id="pop"></div>
  <div class="toast" id="toast"></div>
</div>

let S={bal:69600,stage:{},screen:'learn',
 led:[
  {i:'🎬',t:'看影片',s:'影片完成 · +300',a:'+300',c:'p'},
  {i:'⬆️',t:'上傳作業',s:'完成 · +100',a:'+100',c:'p'},

 ]};
const fmt=n=>n.toLocaleString('en-US');
const NAV=[['learn','📖','學習'],['msg','✉️','訊息',14],['game','🎮','遊戲'],['me','👤','個人']];
function renderNav(){document.getElementById('nav').innerHTML=NAV.map(([s,ic,lb,bd])=>
 `<button class="${s==S.screen?'on':''}" onclick="show('${s}')"><div class="ic">${ic}</div>${lb}${bd?`<span class="badge">${bd}</span>`:''}</button>`).join('');}
function show(s){S.screen=s;closeOv();
 document.querySelectorAll('.screen').forEach(e=>e.classList.toggle('on',e.dataset.s==s));
 document.getElementById('scroll').scrollTop=0;
 document.getElementById('sb').classList.toggle('dark',s=='msg'||s=='me');
 renderNav(); if(s=='game')buildGameMap();}
function openOv(o){document.querySelectorAll('.ov').forEach(e=>e.classList.toggle('on',e.dataset.o==o));
 if(o=='ledger')renderLed(); if(o=='shop')renderShop(); if(o=='collect')renderCollect();}
function closeOv(){document.querySelectorAll('.ov').forEach(e=>e.classList.remove('on'));}
function updBal(){balL.textContent=fmt(S.bal);balG.textContent=fmt(S.bal);}
function owned(){return Object.keys(S.stage).length;}

function renderWeek(){
 const d=[['六',9],['日',10],['一',11,'b'],['二',12],['三',13],['四',14,'b'],['五',15]];
 document.getElementById('week').innerHTML=d.map(([l,n,b])=>
  `<div class="day"><span class="lbl">${l}</span><div class="ring ${b||''}">${n}<span class="chk">✓</span></div></div>`).join('');
}
const ROUTE=[[0.0146, 0.7303], [0.0326, 0.6834], [0.0518, 0.665], [0.071, 0.6499], [0.09, 0.6214], [0.1026, 0.6801], [0.0856, 0.7554], [0.0668, 0.7856], [0.0476, 0.8107], [0.0286, 0.8392], [0.0394, 0.8543], [0.0542, 0.9464], [0.0736, 0.9497], [0.0924, 0.9296], [0.1116, 0.9313], [0.1308, 0.9363], [0.15, 0.9162], [0.1666, 0.8358], [0.1842, 0.7772], [0.1954, 0.8861], [0.2144, 0.8961], [0.2244, 0.7638], [0.24, 0.6784], [0.2584, 0.6315], [0.2776, 0.6248], [0.296, 0.665], [0.3152, 0.6583], [0.3332, 0.6047], [0.317, 0.6918], [0.301, 0.7822], [0.2852, 0.8559], [0.2834, 0.8978], [0.2964, 0.8626], [0.3088, 0.8559], [0.3264, 0.8677], [0.3454, 0.8844], [0.357, 0.7621], [0.3678, 0.6784], [0.3868, 0.6918], [0.4052, 0.6432], [0.4042, 0.5729], [0.3854, 0.5427], [0.366, 0.5377], [0.384, 0.541], [0.3972, 0.4757], [0.3784, 0.4389], [0.3828, 0.4405], [0.3862, 0.5109], [0.3804, 0.665], [0.3678, 0.7152], [0.3706, 0.5561], [0.3742, 0.3953], [0.387, 0.3501], [0.4024, 0.4456], [0.4164, 0.5578], [0.4286, 0.6834], [0.4396, 0.8074], [0.4582, 0.7822], [0.4744, 0.6935], [0.4886, 0.5863], [0.507, 0.5645], [0.5174, 0.6918], [0.536, 0.7203], [0.5544, 0.675], [0.5716, 0.5997], [0.5906, 0.5812], [0.6084, 0.6332], [0.619, 0.7672], [0.6286, 0.8744], [0.6478, 0.8677], [0.6598, 0.9548], [0.6786, 0.933], [0.6948, 0.8459], [0.7138, 0.8275], [0.732, 0.876], [0.7462, 0.9682], [0.7656, 0.9715], [0.7848, 0.9564], [0.8004, 0.871], [0.8118, 0.7822], [0.8272, 0.7856], [0.8452, 0.8191], [0.8634, 0.8409], [0.8538, 0.8492], [0.865, 0.9296], [0.8842, 0.9414], [0.9032, 0.9497], [0.9222, 0.9246], [0.9414, 0.9179], [0.9608, 0.9179], [0.9798, 0.8894], [0.9908, 0.7655], [0.9962, 0.6114], [0.9804, 0.5779], [0.9612, 0.5678], [0.9518, 0.5678]];
let NP=[], mapBuilt=false, PADTOP=0;
function pieceHTML(){if(S.piece!=null&&DOLLS[S.piece])return `<img src="${DOLLS[S.piece].img}" alt="">`;return '<div class="defpin">🚩</div>';}
function buildGameMap(){
 if(S.pos==null)S.pos=6; updBal();
 if(mapBuilt){const pc=document.getElementById('piece');if(pc)pc.innerHTML=pieceHTML();centerGw(false);return;}
 const wrap=document.getElementById('gamewrap'); const ch=wrap.clientHeight||680; const mapH=Math.round(ch*1.5);
 const mapW=Math.round(mapH*5000/597);
 PADTOP=Math.round(ch*0.30); const padBot=Math.round(ch*0.55);
 wrap.style.paddingTop=PADTOP+'px'; wrap.style.paddingBottom=padBot+'px';
 const map=document.getElementById('gamemap');
 map.style.width=mapW+'px'; map.style.height=mapH+'px'; map.style.backgroundImage="url('map-bg.jpg')";
 NP=[null]; for(let i=1;i<=96;i++)NP[i]={x:ROUTE[i-1][0]*mapW,y:ROUTE[i-1][1]*mapH};
 let d='M '+NP[1].x.toFixed(0)+' '+NP[1].y.toFixed(0);
 for(let i=2;i<=96;i++)d+=' L '+NP[i].x.toFixed(0)+' '+NP[i].y.toFixed(0);
 let svg=`<svg width="${mapW}" height="${mapH}" style="position:absolute;inset:0;z-index:1;"><path d="${d}" fill="none" stroke="rgba(255,255,255,.75)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><path d="${d}" fill="none" stroke="#5a4a3a" stroke-width="4" stroke-dasharray="1 11" stroke-linecap="round"/></svg>`;
 let nodes='';
 for(let i=1;i<=96;i++){const c=CHEST.has(i);
  if(c)nodes+=`<div class="node chest" style="left:${NP[i].x}px;top:${NP[i].y}px;" onclick="openChest(${i})">${S['ch'+i]?'🎉':'⭐'}</div>`;
  else nodes+=`<div class="node ${i<S.pos?'done':(i>S.pos?'future':'')}" data-i="${i}" style="left:${NP[i].x}px;top:${NP[i].y}px;">${i}</div>`;}
 nodes+=`<div class="piece" id="piece" style="left:${NP[S.pos].x}px;top:${NP[S.pos].y}px;">${pieceHTML()}</div>`;
 map.innerHTML=svg+nodes; mapBuilt=true;
 setTimeout(()=>centerGw(false),50);
}
function centerGw(smooth){const w=document.getElementById('gamewrap');if(!w||S.pos==null||!NP[S.pos])return;
 const topInset=56, botInset=86; // 讓開上方金幣列與下方前進鈕
 const safeC=topInset+(w.clientHeight-topInset-botInset)/2;
 w.scrollTo({left:NP[S.pos].x-w.clientWidth/2, top:(PADTOP+NP[S.pos].y)-safeC, behavior:smooth?'smooth':'auto'});}
function setPiece(i){if(!S.stage||!S.stage[i]){return;}S.piece=i;
 const pc=document.getElementById('piece');if(pc)pc.innerHTML=pieceHTML();
 renderCollect();toast('🚩','已設為棋子',DOLLS[i].name+' 現在是地圖上移動的棋子');}
function advance(){
 if(S.pos>=96){toast('🏁','已到終點','恭喜完成全部關卡！');return;}
 const arrived=S.pos+1;
 const pv=document.querySelector(`.node[data-i="${S.pos}"]`); if(pv){pv.classList.remove('future');pv.classList.add('done');}
 const nn=document.querySelector(`.node[data-i="${arrived}"]`); if(nn)nn.classList.remove('future');
 S.pos=arrived;
 const pc=document.getElementById('piece'); pc.style.left=NP[arrived].x+'px'; pc.style.top=NP[arrived].y+'px';
 centerGw(true);
 const map=document.getElementById('gamemap');
 for(let s=0;s<6;s++){const sp=document.createElement('div');sp.className='spark';sp.textContent='✨';
  sp.style.left=(NP[arrived].x-14+Math.random()*28)+'px';sp.style.top=(NP[arrived].y-26+Math.random()*28)+'px';
  map.appendChild(sp);setTimeout(()=>sp.remove(),700);}
 setTimeout(()=>pop('🎉','抵達第 '+arrived+' 站！',S.piece!=null?DOLLS[S.piece].name+' 往前走一格':'完成本週進度目標'),450);
}
function pop(e,t,s){const p=document.getElementById('pop');p.innerHTML=`<div class="e">${e}</div><b>${t}</b><span>${s}</span>`;
 p.classList.add('on');clearTimeout(window._pt);window._pt=setTimeout(()=>p.classList.remove('on'),1600);}
function renderLed(){document.getElementById('ledlist').innerHTML=S.led.map(x=>
 `<div class="led"><div class="dot">${x.i}</div><div class="t"><b>${x.t}</b><span>${x.s}</span></div><div class="amt ${x.c}">${x.a}</div></div>`).join('');}
function renderShop(){document.getElementById('dollgrid').innerHTML=DOLLS.map((d,i)=>{
 const st=S.stage[i]||0;
 return `<div class="doll" onclick="openDetail(${i})"><img src="${d.img}"><div class="info">
  <span class="pr">${st?'Lv'+st:fmt(PRICE[d.rarity][0])}</span>
  <div class="nm">${d.name}</div><span class="rb r${d.rarity}">${d.rarity}</span>
  ${st?`<div class="owned">已擁有 · ${st}/3 階</div>`:''}</div></div>`;}).join('');}
let cur=null;
function openDetail(i){cur=i;openOv('detail');const d=DOLLS[i],st=S.stage[i]||0;
 dTitle.textContent=d.name;dImg.src=d.img;dBadge.textContent=d.rarity;dBadge.className='rb r'+d.rarity;
 dStars.innerHTML=[0,1,2].map(k=>`<i class="${k<st?'on':''}"></i>`).join('');
 dOwned.textContent=st?`已擁有 · 目前 ${st}/3 階`:'尚未擁有';
 const price=st>=3?0:PRICE[d.rarity][st];
 if(st>=3){dCard.innerHTML='<b style="color:var(--green)">已升滿級 🎉</b>';dAct.disabled=true;dAct.textContent='已滿級';}
 else{dCard.innerHTML=`<div class="row"><span>${st==0?'兌換基礎價':'升至 '+(st+1)+' 階'}</span><b>${fmt(price)} 金</b></div>
  <div class="row"><span>目前餘額</span><b>${fmt(S.bal)} 金</b></div>
  <div class="row" style="border:0"><span>兌換後</span><b style="color:${S.bal>=price?'var(--green)':'#e07a5f'}">${fmt(S.bal-price)} 金</b></div>`;
  dAct.disabled=false;dAct.textContent=(st==0?'兌換':'升階')+`（${fmt(price)} 金）`;}
}
function doAct(){const d=DOLLS[cur],st=S.stage[cur]||0,price=PRICE[d.rarity][st];
 if(S.bal<price){dialog('餘額不足',`差 ${fmt(price-S.bal)} 金，先去學習賺金幣吧。`,'知道了',null);return;}
 dialog(st==0?'確定要兌換嗎？':'確定要升階嗎？',`${d.name}（${d.rarity}）· 花費 ${fmt(price)} 金`,'確定',()=>{
  S.bal-=price;S.stage[cur]=st+1;
  const first=(S.piece==null); if(first)S.piece=cur;
  const _pc=document.getElementById('piece'); if(_pc)_pc.innerHTML=pieceHTML();
  S.led.unshift({i:'🧸',t:st==0?'兌換公仔':'公仔升階',s:d.name+' · '+(st+1)+' 階',a:'−'+fmt(price),c:'n'});
  updBal();openDetail(cur);
  toast('🧸','兌換成功！',(st==0?(first?d.name+' 已設為地圖棋子！':d.name+'｜可到「收藏」設為棋子'):d.name+' 升至 '+(st+1)+' 階'));});}
function openChest(i){if(S['ch'+i]){toast('🎉','已開啟','這個寶箱開過囉');return;}
 dialog('解鎖寶箱站 '+i,'花 500 金開寶箱，掉落金幣或公仔碎片。',S.bal>=500?'解鎖（500 金）':'餘額不足',S.bal>=500?()=>{
  S.bal-=500;S['ch'+i]=true;S.led.unshift({i:'🎁',t:'解鎖寶箱',s:'站 '+i,a:'−500',c:'n'});updBal();toast('🎁','開箱！','+ 公仔碎片 ×3');}:null);}
function renderCollect(){document.getElementById('colHead').textContent=owned()+' / 24';
 document.getElementById('collectgrid').innerHTML=DOLLS.map((d,i)=>{const st=S.stage[i]||0;const isP=(S.piece===i);
  return `<div class="doll"${st?` onclick="setPiece(${i})" style="cursor:pointer;${isP?'outline:2px solid var(--coral);outline-offset:-2px;':''}"`:''}>${st?`<img src="${d.img}">`:'<div style="height:118px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:40px;color:#bbb;">？</div>'}
   <div class="info"><div class="nm">${st?d.name:'？？？'}</div>${st?`<span class="rb r${d.rarity}">${d.rarity} · ${st}/3</span><div style="margin-top:6px;font-size:11px;font-weight:700;text-align:center;border-radius:8px;padding:4px 0;${isP?'background:var(--coral);color:#fff;':'background:#f0ece6;color:#8a7f70;'}">${isP?'✓ 目前棋子':'設為棋子'}</div>`:'<span style="font-size:11px;color:#aaa;">未擁有</span>'}</div></div>`;
 }).join('');}
function dialog(title,msg,ok,fn){document.getElementById('dlg').innerHTML=
 `<div class="c"><h3>${title}</h3><p>${msg}</p></div><div class="btns">${fn?'<button onclick="closeMask()">取消</button>':''}<button class="pri" onclick="closeMask();(${fn?'window._fn()':''})">${ok}</button></div>`;
 window._fn=fn;document.getElementById('mask').classList.add('on');}
function closeMask(){document.getElementById('mask').classList.remove('on');}
let tmr;function toast(b,a,s){const t=document.getElementById('toast');
 t.innerHTML=`<div class="big">${b}</div><b>${a}</b><br><span style="font-size:13px;opacity:.85">${s}</span>`;
 t.classList.add('on');clearTimeout(tmr);tmr=setTimeout(()=>t.classList.remove('on'),1500);}
function setMode(m){const tab=(m=='tablet');
 document.body.classList.toggle('tab',tab);
 document.getElementById('mPhone').classList.toggle('on',!tab);
 document.getElementById('mTab').classList.toggle('on',tab);
 // 邊框尺寸改變 → 地圖需重建以符合新比例
 mapBuilt=false;
 const gs=document.querySelector('.screen[data-s=game]');
 if(gs&&gs.classList.contains('on')) buildGameMap();
}
renderWeek();renderNav();updBal();

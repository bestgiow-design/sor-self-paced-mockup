<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>看字唸音 · POC</title>
<style>
  :root{--coral:#f08c7c;--green:#5fb389;--blue:#7fb2e0;--ink:#38414f;--dim:#8a94a6;--line:#e3e8ef;--bg:#eef2f6;--red:#e8776a;--yellow:#e6b23c;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;justify-content:center}
  .app{width:100%;max-width:460px;padding:16px 14px 40px;display:flex;flex-direction:column}
  h1{font-size:1.3rem;text-align:center;color:#2f3e57}
  .sub{text-align:center;color:var(--dim);font-size:.8rem;margin:3px 0 12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 4px 16px rgba(34,49,79,.05)}
  .wordbox{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:210px;border:2px dashed var(--line);border-radius:16px;margin:6px 0 12px;padding:14px}
  .zhu{display:flex;flex-direction:column;align-items:center;gap:3px}
  .zhu img{width:64px;height:64px;object-fit:contain;display:block}
  .cap{margin-top:8px;color:var(--dim);font-size:.9rem;font-weight:700;letter-spacing:.05em}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.85rem;color:var(--dim)}
  .navbtn{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-family:inherit;font-weight:700;color:#4a4a4a;cursor:pointer}
  .row{display:flex;gap:8px;margin-top:8px}
  .btn{flex:1;border:none;border-radius:13px;padding:13px 6px;font-family:inherit;font-size:.95rem;font-weight:800;cursor:pointer;color:#fff}
  .btn.ref{background:var(--blue)} .btn.rec{background:var(--coral)} .btn.rec.on{background:#d9534f} .btn.play{background:#8a94a6} .btn.score{background:var(--green)}
  .btn:disabled{opacity:.4;cursor:default}
  .scorebox{margin-top:14px;display:none}
  .overall{text-align:center;margin-bottom:10px}
  .overall .v{font-size:2.2rem;font-weight:800}
  .overall label{display:block;font-size:.72rem;color:var(--dim)}
  .prow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .prow .pl{width:52px;font-weight:800;font-family:monospace;color:#2f3e57}
  .prow .bar{flex:1;height:14px;background:#eef1f5;border-radius:7px;overflow:hidden}
  .prow .bar>i{display:block;height:100%;border-radius:7px}
  .prow .sc{width:38px;text-align:right;font-size:.82rem;font-weight:700}
  .g{background:var(--green)} .y{background:var(--yellow)} .r{background:var(--red)}
  .gt{color:var(--green)} .yt{color:var(--yellow)} .rt{color:var(--red)}
  .set{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
  .set label{font-size:.78rem;font-weight:700;color:var(--dim);display:block;margin-bottom:3px}
  .set input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-family:inherit;font-size:.9rem}
  .toggle{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.85rem}
  .toggle input{width:18px;height:18px}
  .note{color:var(--dim);font-size:.75rem;line-height:1.6;margin-top:10px}
  .msg{text-align:center;font-size:.85rem;font-weight:700;min-height:20px;margin-top:8px}
  .msg.err{color:var(--red)}
</style></head>
<body><div class="app">
  <h1>看字唸音 · POC</h1>
  <div class="sub">看注音圖 → 唸出來 → 錄音 → 逐音評分（SpeechAce）</div>
  <div class="card">
    <div class="nav">
      <button class="navbtn" onclick="nav(-1)">‹ 上一個</button>
      <span>第 <b id="idx">1</b> / <b id="tot">16</b></span>
      <button class="navbtn" onclick="nav(1)">下一個 ›</button>
    </div>
    <div class="wordbox"><div class="zhu" id="zhu"></div><div class="cap" id="cap"></div></div>
    <div class="row">
      <button class="btn ref" onclick="playRef()">🔊 聽正解</button>
      <button class="btn rec" id="recBtn" onclick="toggleRec()">🎤 錄音</button>
    </div>
    <div class="row">
      <button class="btn play" id="playBtn" onclick="playMine()" disabled>▶ 我的錄音</button>
      <button class="btn score" id="scoreBtn" onclick="doScore()" disabled>✅ 評分</button>
    </div>
    <div class="msg" id="msg"></div>

    <div class="scorebox" id="scorebox">
      <div class="overall"><div class="v" id="ovV">–</div><label>整體發音分數</label></div>
      <div id="phones"></div>
    </div>

    <div class="set">
      <label class="toggle"><input type="checkbox" id="mock" checked onchange="onMock()"> 示範模式（不呼叫 API，隨機模擬分數）</label>
      <div id="keyWrap" style="display:none;margin-top:10px">
        <label>SpeechAce API Key</label>
        <input id="apikey" placeholder="貼上你的 key（僅存在本頁，不外傳到別處）">
        <div class="note">關掉示範模式即用真 API。音檔為 webm 直接送 <code>phone_list</code> 端點（dialect=en-us）。<br>⚠️ 若瀏覽器因 CORS 擋下請求，需要一個小的本機代理——跟我說我再給你。</div>
      </div>
    </div>
    <div class="note">提示：麥克風需要在 <b>https 或 localhost</b> 才能用（直接雙擊開檔可能被瀏覽器擋麥克風）。要能實測，建議我幫你部署到 https。</div>
  </div>
</div>

      mediaRec.start(); recording=true; btn.classList.add('on'); btn.textContent='⏹ 停止';
      document.getElementById('msg').textContent='錄音中… 請唸出這個音'; document.getElementById('msg').className='msg';
    }catch(e){ document.getElementById('msg').textContent='無法取用麥克風（需 https/localhost 並允許權限）'; document.getElementById('msg').className='msg err'; }
  } else {
    mediaRec.stop(); recording=false; btn.classList.remove('on'); btn.textContent='🎤 錄音';
    document.getElementById('msg').textContent='錄好了，按「評分」';
  }
}
function onMock(){ document.getElementById('keyWrap').style.display=document.getElementById('mock').checked?'none':'block'; }
function clsFor(v){ return v>=80?'g':v>=60?'y':'r'; }
function clsT(v){ return v>=80?'gt':v>=60?'yt':'rt'; }
function showScores(overall, phones){
  document.getElementById('scorebox').style.display='block';
  const ov=document.getElementById('ovV'); ov.textContent=Math.round(overall); ov.className='v '+clsT(overall);
  document.getElementById('phones').innerHTML=phones.map(p=>{
    const v=Math.round(p.score);
    return '<div class="prow"><span class="pl">'+p.phone+'</span><span class="bar"><i class="'+clsFor(v)+'" style="width:'+v+'%"></i></span><span class="sc '+clsT(v)+'">'+v+'</span></div>';
  }).join('');
}
function mockScore(){
  const ph=SND[i].arpa.split('|');
  const phones=ph.map(p=>({phone:p, score: 55+Math.random()*45}));
  const overall=phones.reduce((a,b)=>a+b.score,0)/phones.length;
  showScores(overall, phones);
  document.getElementById('msg').textContent='（示範模式：隨機模擬分數）';
}
async function doScore(){
  if(!recBlob){ return; }
  if(document.getElementById('mock').checked){ mockScore(); return; }
  const key=document.getElementById('apikey').value.trim();
  if(!key){ document.getElementById('msg').textContent='請先貼上 API Key'; document.getElementById('msg').className='msg err'; return; }
  document.getElementById('msg').textContent='評分中…'; document.getElementById('msg').className='msg';
  try{
    const fd=new FormData();
    fd.append('phone_list', SND[i].arpa);
    fd.append('user_audio_file', recBlob, 'rec.webm');
    const r=await fetch('https://api.speechace.co/api/scoring/phone_list/v9/json?key='+encodeURIComponent(key)+'&dialect=en-us',{method:'POST',body:fd});
    const j=await r.json();
    if(j.status!=='success'||!j.word_score){ throw new Error(j.detail_message||j.status||'評分失敗'); }
    const list=j.word_score.phone_score_list||[];
    showScores(j.word_score.quality_score, list.map(p=>({phone:p.phone+(p.sound_most_like&&p.sound_most_like!==p.phone?'→'+p.sound_most_like:''), score:p.quality_score})));
    document.getElementById('msg').textContent='';
  }catch(e){
    document.getElementById('msg').textContent='API 失敗：'+e.message+'（可能是 CORS，需本機代理）';
    document.getElementById('msg').className='msg err';
  }
}
render();
</script></body></html>
